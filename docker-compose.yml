version: '3.8'

services:
  # 1. SQL Server Database
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql-server
    hostname: sql-server-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Password123 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 3s
    restart: unless-stopped

  # 2. Backend API
  glms-backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: glms-api
    hostname: glms-backend-api
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=ContractManagementDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=your-super-secret-key-with-at-least-32-characters-long-for-jwt-signing
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network
    restart: unless-stopped

  # 3. Frontend MVC
  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: glms-web
    hostname: glms-frontend-web
    environment:
      - ApiBaseUrl=http://glms-backend-api:8080/
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      glms-backend-api:
        condition: service_started
    networks:
      - glms-network
    restart: unless-stopped

networks:
  glms-network:
    name: glms-network
    driver: bridge

volumes:
  sqlserver_data:
    name: glms-sqlserver-data
